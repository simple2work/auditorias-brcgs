{% extends "base.html" %}

{% block title %}Login - Auditorias BRCGS{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <h2>Simple2Work</h2>
        <p style="text-align: center; color: #28939D; margin-bottom: 2rem; font-size: 0.95rem;">Auditorias BRCGS</p>
        
        {% if erro %}
            <div class="error">{{ erro }}</div>
        {% endif %}
        
        <form id="loginForm" method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="filipa.ramos@simple2work.pt">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" style="width: 100%; margin-top: 1rem;">Entrar</button>
        </form>
        
        <p style="text-align: center; margin-top: 2rem; color: #333F48; font-size: 0.85rem;">
            Sistema seguro de auditorias BRCGS
        </p>
    </div>
</div>
{% endblock %}
